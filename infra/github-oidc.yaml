AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC 部署角色 —— 让 GitHub Actions 免长期密钥假设此角色，
  执行 SAM 部署（my-better-t-app 后端栈）。一次性部署，输出角色 ARN 供 workflow 用。

Parameters:
  GitHubOrg:
    Type: String
    Default: Tearl
    Description: GitHub 组织/用户名。
  GitHubRepo:
    Type: String
    Default: my-better-t-app
    Description: 仓库名。
  GitHubBranch:
    Type: String
    Default: main
    Description: 允许部署的分支。
  CreateOIDCProvider:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >
      账号里是否还没有 GitHub 的 OIDC provider？没有填 true（本模板创建它）；
      已有（其它仓库配过）填 false，避免重复创建报错。

Conditions:
  ShouldCreateProvider: !Equals [!Ref CreateOIDCProvider, "true"]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: my-better-t-app-github-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: sam-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormation
                Effect: Allow
                Action: cloudformation:*
                Resource: "*"
              - Sid: SamManagedBucket
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::aws-sam-cli-managed-default-*
                  - arn:aws:s3:::aws-sam-cli-managed-default-*/*
              - Sid: ServerlessResources
                Effect: Allow
                Action:
                  - lambda:*
                  - apigateway:*
                  - logs:*
                Resource: "*"
              - Sid: VpcRead
                Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                  - ec2:DescribeNetworkInterfaces
                Resource: "*"
              - Sid: FunctionRole
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/my-better-t-app-*"

Outputs:
  DeployRoleArn:
    Description: 填到 GitHub Secret AWS_DEPLOY_ROLE_ARN。
    Value: !GetAtt DeployRole.Arn
